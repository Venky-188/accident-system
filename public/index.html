<!DOCTYPE html>
<html>
<head>
    <title>Accident System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🚑 Accident Reporting</h1>

    <div class="card">

        <h2>Report Accident</h2>

        <form id="form">

            <input type="text" id="type" placeholder="Accident Type" required>
            <input type="text" id="severity" placeholder="Severity (Low/Medium/High)" required>

            <button type="button" onclick="getLocation()" class="location-btn">
                📍 Get Location
            </button>

            <p id="locationText"></p>

            <iframe id="map"></iframe>

            <button type="submit" class="report-btn">🚨 Report Accident</button>

        </form>

    </div>

    <div class="card">
        <h2>Live Accidents</h2>
        <ul id="list"></ul>
    </div>

</div>

<script>
if (localStorage.getItem("role") !== "user") {
    window.location.href = "/login.html";
}

let lat = null;
let lon = null;

function getLocation() {
    navigator.geolocation.getCurrentPosition((pos) => {
        lat = pos.coords.latitude;
        lon = pos.coords.longitude;

        document.getElementById("locationText").innerText =
            "📍 " + lat + ", " + lon;

        document.getElementById("map").src =
            `https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed`;
    });
}

const form = document.getElementById("form");
const list = document.getElementById("list");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        type: document.getElementById("type").value,
        severity: document.getElementById("severity").value,
        lat: lat,
        lon: lon,
        user_id: 1
    };

await fetch("/report", {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "Authorization": token
    },
    body: JSON.stringify(data)
});
async function loadData() {

    const token = localStorage.getItem("token");

    const res = await fetch("/accidents", {
        headers: {
            "Authorization": token
        }
    });

    const data = await res.json();

    list.innerHTML = "";

    data.forEach(a => {
        const li = document.createElement("li");
        li.innerText = `🚗 ${a.accident_type} | ⚠ ${a.severity}`;
        list.appendChild(li);
    });
}

loadData();
setInterval(loadData, 3000);

</script>

</body>
</html>
<button onclick="logout()">Logout</button>
