<!DOCTYPE html>
<html>
<head>
    <title>Accident System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🚑 Accident Reporting</h1>

    <button onclick="logout()">Logout</button>

    <div class="card">

        <h2>Report Accident</h2>

        <form id="form">

            <input type="text" id="type" placeholder="Accident Type" required>
            <input type="text" id="severity" placeholder="Severity" required>

            <button type="button" onclick="getLocation()">📍 Get Location</button>

            <p id="locationText"></p>

            <button type="submit">🚨 Report</button>

        </form>

    </div>

    <div class="card">
        <h2>Live Accidents</h2>
        <ul id="list"></ul>
    </div>

</div>

<script>

let lat = null;
let lon = null;

function getLocation() {
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;

            document.getElementById("locationText").innerText =
                "📍 " + lat + ", " + lon;
        },
        () => {
            alert("Location access denied ❌");
        }
    );
}

function logout() {
    localStorage.clear();
    window.location.href = "/login.html";
}

const form = document.getElementById("form");
const list = document.getElementById("list");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const token = localStorage.getItem("token");

    const data = {
        type: document.getElementById("type").value,
        severity: document.getElementById("severity").value,
        lat: lat,
        lon: lon,
        user_id: 1
    };

    await fetch("/report", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify(data)
    });

    loadData();
});

async function loadData() {
    const token = localStorage.getItem("token");

    const res = await fetch("/accidents", {
        headers: {
            "Authorization": token
        }
    });

    // 🔥 HANDLE ERROR PROPERLY
    if (!res.ok) {
        console.log("Session expired");
        localStorage.clear();
        window.location.href = "/login.html";
        return;
    }

    const data = await res.json();

    list.innerHTML = "";

    data.forEach(a => {
        const li = document.createElement("li");
        li.innerText = `🚗 ${a.accident_type} | ⚠ ${a.severity}`;
        list.appendChild(li);
    });
}

loadData();
// setInterval(loadData, 3000);

</script>

</body>
</html>
